<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo RAG Support B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">RAG Support Agent 🤖</h1>
        <div class="text-sm bg-slate-800 p-2 rounded border border-slate-700">
            Client ID: <span class="text-blue-400 font-mono">test</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Zone de Chat -->
        <div class="flex-1 flex flex-col p-4">
            <div id="chat-box" class="flex-1 bg-white rounded-lg shadow-sm p-4 overflow-y-auto mb-4 border border-gray-200">
                <div class="mb-4">
                    <span class="bg-blue-100 text-blue-800 px-3 py-2 rounded-lg inline-block">Bonjour ! Posez-moi une question sur la documentation de Firecrawl.</span>
                </div>
            </div>
            
            <!-- Input area -->
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="question-input" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Comment gérer l'authentification ?" required>
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 transition">Envoyer</button>
            </form>
        </div>

        <!-- Panneau d'Analyse (Vue Admin) -->
        <div class="w-1/3 bg-white border-l border-gray-200 p-6 flex flex-col overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">🔍 Analyse Système (Vue Admin)</h2>
            
            <div id="loading" class="hidden flex justify-center items-center py-10">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
            </div>

            <div id="metrics-panel" class="hidden flex-col gap-4">
                <!-- Action / Routage -->
                <div class="p-4 rounded-lg bg-gray-50 border border-gray-200">
                    <p class="text-sm text-gray-500 font-semibold mb-1">Routage recommandé</p>
                    <p id="metric-action" class="text-xl font-bold"></p>
                </div>

                <!-- Confiance -->
                <div class="p-4 rounded-lg bg-gray-50 border border-gray-200">
                    <p class="text-sm text-gray-500 font-semibold mb-1">Score de confiance</p>
                    <p id="metric-confidence" class="text-xl font-bold text-gray-800"></p>
                </div>

                <!-- Latence -->
                <div class="p-4 rounded-lg bg-gray-50 border border-gray-200">
                    <p class="text-sm text-gray-500 font-semibold mb-1">Temps de réponse (Latence)</p>
                    <p id="metric-latency" class="text-xl font-bold text-gray-800"></p>
                </div>

                <!-- Sources -->
                <div class="p-4 rounded-lg bg-gray-50 border border-gray-200">
                    <p class="text-sm text-gray-500 font-semibold mb-1">Sources utilisées</p>
                    <ul id="metric-sources" class="text-sm text-blue-600 list-disc pl-4 break-words"></ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION : Mets ici la clé API qui est dans ton fichier .env local
        const API_KEY = "1b9c17be1851eb49e75b9a3d6e7cb423411c1594b8a4ff6e25b9c5b2be286e2c"; 
        const API_URL = "http://localhost:8000/v1/query";

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            // Ajouter la question au chat
            addMessage(question, 'user');
            input.value = '';

            // UI Loading state
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('metrics-panel').classList.add('hidden');

            try {
                const t0 = performance.now();
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        client_id: "test", // Ton client Firecrawl
                        question: question
                    })
                });

                if (!response.ok) throw new Error(`Erreur API: ${response.status}`);

                const data = await response.json();
                const elapsedSec = (performance.now() - t0) / 1000;

                // Ajouter la réponse au chat
                addMessage(data.answer_text, 'bot');

                // Comportements spécifiques selon le routage
                if (data.action === 'escalate') {
                    addMessage("Notre équipe va prendre en charge votre demande. Un agent vous répondra sous 2h.", 'bot');
                    addEscalateForm();
                } else if (data.action === 'suggest_to_agent') {
                    addMessage("Réponse suggérée — en attente de validation par un agent.", 'bot');
                }

                // Mettre à jour les métriques
                updateMetrics(data, elapsedSec);

            } catch (error) {
                addMessage("Erreur de connexion à l'API locale. Uvicorn tourne-t-il ?", 'error');
                console.error(error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('metrics-panel').classList.remove('hidden');
            }
        });

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'mb-4 text-right';
            
            let innerHTML = '';
            if (sender === 'user') {
                innerHTML = `<span class="bg-gray-800 text-white px-4 py-2 rounded-lg inline-block max-w-[80%] text-left">${text}</span>`;
            } else if (sender === 'bot') {
                div.className = 'mb-4 text-left';
                // Convertir les sauts de ligne en <br> pour l'affichage
                const formattedText = text.replace(/\n/g, '<br>');
                innerHTML = `<span class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg inline-block border border-gray-200 max-w-[90%]">${formattedText}</span>`;
            } else {
                div.className = 'mb-4 text-center';
                innerHTML = `<span class="bg-red-100 text-red-800 px-4 py-2 rounded-lg inline-block text-sm">${text}</span>`;
            }
            
            div.innerHTML = innerHTML;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addEscalateForm() {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'mb-4 text-left';
            div.innerHTML = `
                <div class="bg-orange-50 border border-orange-200 rounded-lg px-4 py-3 inline-block max-w-[90%]">
                    <form onsubmit="handleEscalateSubmit(event, this)">
                        <label class="block text-sm text-gray-700 mb-1 font-medium">Email</label>
                        <input type="email" placeholder="Votre email" required
                            class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 mb-2">
                        <button type="submit"
                            class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-orange-600 transition">
                            Envoyer ma demande
                        </button>
                    </form>
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEscalateSubmit(e, form) {
            e.preventDefault();
            const container = form.closest('div');
            container.innerHTML = '<span class="text-green-700 font-medium">Demande envoyée ✓ Vous recevrez une réponse sous 2h.</span>';
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateMetrics(data, elapsedSec) {
            // Action
            const actionEl = document.getElementById('metric-action');
            if (data.action === 'auto_reply') {
                actionEl.innerHTML = '<span class="text-green-600">✅ Réponse Automatique</span>';
            } else if (data.action === 'suggest_to_agent') {
                actionEl.innerHTML = '<span class="text-yellow-600">⚠️ Brouillon pour l\'agent</span>';
            } else {
                actionEl.innerHTML = '<span class="text-red-600">🛑 Escalade (Humain requis)</span>';
            }

            // Confiance & Latence
            document.getElementById('metric-confidence').textContent = `${(data.confidence_score * 100).toFixed(1)} %`;
            document.getElementById('metric-latency').textContent = `${elapsedSec.toFixed(2)} secondes`;

            // Sources
            const sourcesList = document.getElementById('metric-sources');
            sourcesList.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach(url => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${url}" target="_blank" class="hover:underline">${url}</a>`;
                    sourcesList.appendChild(li);
                });
            } else {
                sourcesList.innerHTML = '<li class="text-gray-500">Aucune source utilisée</li>';
            }
        }
    </script>
</body>
</html>
